services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: golem
      POSTGRES_PASSWORD: golem
      POSTGRES_DB: golem_test
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U golem -d golem_test"]
      interval: 2s
      timeout: 3s
      retries: 20
