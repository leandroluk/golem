services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: golem
      POSTGRES_PASSWORD: golem
      POSTGRES_DB: golem_test
    ports: [ "55432:5432" ]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U golem -d golem_test"]
      interval: 2s
      timeout: 3s
      retries: 20

  mysql:
    image: mysql:8
    environment:
      MYSQL_USER: golem
      MYSQL_PASSWORD: golem
      MYSQL_DATABASE: golem_test
      MYSQL_ROOT_PASSWORD: golem_root
    ports: [ "53306:3306" ]
    # No init schema: driver/mysql's conformance suite creates its own
    # CREATE TEMPORARY TABLEs at test-run time (see internal/dialecttest),
    # so an empty, ready-to-connect database is all this needs to provide.
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u golem -pgolem"]
      interval: 2s
      timeout: 3s
      retries: 20

  mssql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "Golem_Test_2026!"
      MSSQL_PID: Developer
    ports: [ "51433:1433" ]
    # No init schema: driver/mssql's conformance suite creates its own
    # CREATE TABLEs at test-run time (see internal/dialecttest), so a
    # ready-to-connect "master" database is all this needs to provide.
    # Pulling this image needs mcr.microsoft.com's CDN backend reachable —
    # see README.md's M18 note if `docker pull` hangs/fails.
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -C -S localhost -U sa -P \"$$MSSQL_SA_PASSWORD\" -Q 'SELECT 1' || /opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P \"$$MSSQL_SA_PASSWORD\" -Q 'SELECT 1'"]
      interval: 5s
      timeout: 5s
      retries: 20

  oracle:
    image: gvenzl/oracle-free:23-slim
    environment:
      ORACLE_PASSWORD: "Golem_Test_2026"
    ports: [ "51521:1521" ]
    # No init schema: driver/oracle's conformance suite creates its own
    # CREATE TABLEs at test-run time (see internal/dialecttest), so a
    # ready-to-connect FREEPDB1 pluggable database is all this needs to
    # provide. Unlike M18's mcr.microsoft.com, this image needs no
    # container-registry login and pulled cleanly in this environment.
    healthcheck:
      test: ["CMD", "healthcheck.sh"]
      interval: 5s
      timeout: 5s
      retries: 20
