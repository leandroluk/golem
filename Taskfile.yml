version: "3"

vars:
  GOLEM_TEST_DSN: "{{.GOLEM_TEST_DSN | default \"postgres://golem:golem@localhost:55432/golem_test?sslmode=disable\"}}"

tasks:
  build:
    desc: Compile all packages
    cmds:
      - go build ./...

  vet:
    desc: Run go vet on all packages
    cmds:
      - go vet ./...

  test:
    desc: Run unit tests (short mode, no Docker)
    cmds:
      - go test ./... -short

  test-integration:
    desc: Spin up Postgres, run integration tests, tear down (always)
    env:
      GOLEM_TEST_DSN: "{{.GOLEM_TEST_DSN}}"
    cmds:
      - docker compose -f .docker/docker-compose.test.yml up -d --wait
      - defer: docker compose -f .docker/docker-compose.test.yml down
      - go test -tags=integration ./...

  gate-quick:
    desc: Fast gate — build + vet + unit tests
    cmds:
      - task: build
      - task: vet
      - task: test

  gate-full:
    desc: Full gate — gate-quick + integration tests
    cmds:
      - task: gate-quick
      - task: test-integration

