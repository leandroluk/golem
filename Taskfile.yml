version: "3"

vars:
  GOLEM_TEST_DSN: "{{.GOLEM_TEST_DSN | default \"postgres://golem:golem@localhost:55432/golem_test?sslmode=disable\"}}"
  GOLEM_MYSQL_TEST_DSN: "{{.GOLEM_MYSQL_TEST_DSN | default \"golem:golem@tcp(localhost:53306)/golem_test\"}}"
  GOLEM_MSSQL_TEST_DSN: "{{.GOLEM_MSSQL_TEST_DSN | default \"sqlserver://sa:Golem_Test_2026!@localhost:51433?database=master\"}}"

tasks:
  build:
    desc: Compile all packages
    cmds:
      - go build ./...

  vet:
    desc: Run go vet on all packages
    cmds:
      - go vet ./...

  test:
    desc: Run unit tests (short mode, no Docker)
    cmds:
      - go test ./... -short

  coverage:
    desc: Run unit tests with coverage (matches .github/actions/go-ci), writes .coverage/coverage.txt + .coverage/coverage.html
    cmds:
      - mkdir -p .coverage
      - go test ./... -short -coverpkg=./... -coverprofile=.coverage/coverage.txt -covermode=atomic
      # internal/dialecttest/locking.go's lockedFind (line 46+) only runs
      # when the real adapter under test supports a given lock strength —
      # under -short (no Docker), only driver/sqlite's untagged conformance
      # test exercises it, and sqlite reports every strength unsupported, so
      # these lines are legitimately unreachable in THIS run (100% reachable
      # under `task test-integration`, see STATE.md AD-043/AD-044). Go has
      # no source-level coverage-ignore pragma, so internal/covfilter (a
      # plain Go program — works wherever `go` runs, no awk/shell-utility
      # dependency) strips those specific profile entries before computing
      # %. Keep its excludeFromLine const in sync with locking.go's own
      # "COVERAGE-EXCLUDED" comment if that file's lines ever shift.
      - go run ./internal/covfilter .coverage/coverage.txt
      - go tool cover -html=.coverage/coverage.txt -o .coverage/coverage.html
      - go tool cover -func=.coverage/coverage.txt

  test-integration:
    desc: Spin up Postgres + MySQL + SQL Server, run integration tests, tear down (always)
    env:
      GOLEM_TEST_DSN: "{{.GOLEM_TEST_DSN}}"
      GOLEM_MYSQL_TEST_DSN: "{{.GOLEM_MYSQL_TEST_DSN}}"
      GOLEM_MSSQL_TEST_DSN: "{{.GOLEM_MSSQL_TEST_DSN}}"
    cmds:
      - docker compose -f .docker/docker-compose.test.yml up -d --wait
      - defer: docker compose -f .docker/docker-compose.test.yml down
      # go's "..." wildcard skips dot-prefixed dirs even when given explicitly
      # (e.g. "./.examples/..." still matches nothing), so each dot-prefixed
      # package needing coverage must be listed by its exact path — otherwise
      # .examples/postgres-minimal-blog's integration tests never run (see
      # STATE.md L-003).
      - go test -tags=integration ./...
      - go test -tags=integration ./.examples/postgres-minimal-blog

  gate-quick:
    desc: Fast gate — build + vet + unit tests
    cmds:
      - task: build
      - task: vet
      - task: test

  gate-full:
    desc: Full gate — gate-quick + integration tests
    cmds:
      - task: gate-quick
      - task: test-integration

