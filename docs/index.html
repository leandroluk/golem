<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Golem</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="description" content="A type-safe, TypeORM-inspired ORM for Go, built with generics and field-pointer references">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">

  <!-- Docsify Themeable style (Simple theme) -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify-themeable@0/dist/css/theme-simple.css">

  <!-- Code highlight theme (Prism Tomorrow) -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/prismjs@1/themes/prism-tomorrow.min.css">

  <style>
    :root {
      /* Brown/amber scale anchored on Tailwind's yellow-900 (oklch(42.1% 0.095 57.708)),
         matching the mascot's clay-brown color */
      --theme-color: oklch(42.1% 0.095 57.708);
      --theme-color-hover: oklch(52% 0.095 57.708);
      --theme-color-active: oklch(32% 0.095 57.708);
      --base-font-size: 16px;
      --heading-color: oklch(28% 0.06 57.708);
      --strong-color: oklch(22% 0.05 57.708);
      --sidebar-background: #faf6f0;
      --sidebar-width: 280px;
      --content-max-width: 900px;
      --code-theme-background: #2d2d2d;
      --code-inline-background: #f5efe6;
      --code-inline-color: oklch(28% 0.06 57.708);
      --code-inline-border-radius: 4px;
    }

    body {
      font-family: 'Outfit', 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    .markdown-section pre {
      border-radius: 12px;
      box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
      border: 1px solid #3e3e3e;
      margin: 1.5em 0;
      background-color: #2d2d2d !important;
    }

    .markdown-section pre code {
      color: #f8f8f2 !important;
      font-family: 'Fira Code', Consolas, Monaco, 'Andale Mono', 'Ubuntu Mono', monospace !important;
    }

    .sidebar {
      border-right: 1px solid oklch(90% 0.02 57.708);
    }

    .sidebar-nav li a {
      font-weight: 500;
      color: oklch(45% 0.03 57.708);
      transition: color 0.2s ease;
    }

    .sidebar-nav li a:hover {
      color: var(--theme-color-hover);
    }

    .sidebar-nav li.active > a {
      color: var(--theme-color);
      font-weight: 600;
      border-right: 2px solid var(--theme-color);
    }

    a {
      color: var(--theme-color);
    }
    a:hover {
      color: var(--theme-color-hover);
    }

    .markdown-section img[alt="Golem"] {
      max-width: 100%;
      border-radius: 12px;
    }
  </style>
</head>
<body>
  <div id="app">Loading documentation...</div>
  <script>
    window.$docsify = {
      name: 'Golem',
      repo: 'https://github.com/leandroluk/golem',
      loadSidebar: true,
      subMaxLevel: 3,
      auto2top: true,
      search: {
        maxAge: 86400000,
        paths: 'auto',
        placeholder: 'Search...',
        noData: 'No results found!',
        depth: 6
      },
      copyCode: {
        buttonText : 'Copy',
        errorText  : 'Error',
        successText: 'Copied!'
      }
    }
  </script>
  <!-- Docsify v4 -->
  <script src="https://cdn.jsdelivr.net/npm/docsify@4"></script>
  <!-- Plugins -->
  <script src="https://cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-copy-code/dist/docsify-copy-code.min.js"></script>
  <!-- Additional syntax highlighting (Prism) -->
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-go.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-bash.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-sql.min.js"></script>
</body>
</html>
